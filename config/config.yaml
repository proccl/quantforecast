# QuantForecast 配置文件
# 所有参数集中管理，避免硬编码

# ============ 数据配置 ============
data:
  symbol: "01810"                    # 股票代码 (小米)
  name: "xiaomi"                     # 数据文件前缀
  data_file: "data/xiaomi_real.csv"  # 数据文件路径
  
  # 时间序列参数
  seq_len: 20                        # 输入序列长度 (历史天数)
  pred_len: 5                        # 预测序列长度 (未来天数)
  
  # 数据分割比例
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15

# ============ 模型配置 ============
model:
  name: "PatchTST"
  
  # PatchTST 参数
  patch_size: 16
  stride: 8                          # patch 步长
  d_model: 32                        # 嵌入维度
  n_heads: 2                         # 注意力头数
  n_layers: 2                        # Transformer 层数
  d_ff: 128                          # 前馈网络维度
  dropout: 0.1                       # Dropout 率
  
  # 输出参数
  output_dim: 1                      # 输出维度

# ============ 训练配置 ============
training:
  # 优化器参数
  optimizer: "Adam"
  lr: 0.001                          # 学习率
  weight_decay: 0.0001                 # 权重衰减
  
  # 学习率调度
  scheduler: "ReduceLROnPlateau"
  scheduler_patience: 5
  scheduler_factor: 0.5
  
  # 训练参数
  epochs: 100
  batch_size: 32
  
  # 早停
  early_stopping: true
  early_stopping_patience: 10
  early_stopping_min_delta: 0.001
  
  # 设备
  device: "auto"                     # auto/cpu/cuda

# ============ 超参数优化配置 ============
optimization:
  enabled: false                     # 是否启用超参数搜索
  
  # Optuna 参数
  n_trials: 100
  timeout: 3600                      # 秒
  
  # 搜索空间
  search_space: "basic"              # basic/advanced
  
  # 优化目标
  objective: "val_accuracy"          # 优化目标指标
  direction: "maximize"              # maximize/minimize

# ============ 回测配置 ============
backtest:
  initial_capital: 100000            # 初始资金 (HKD)
  transaction_cost: 0.001            # 交易成本 (0.1%)
  
  # 交易信号阈值
  long_threshold: 0.01               # 做多阈值 (1%)
  short_threshold: -0.01             # 做空阈值 (-1%)
  
  # 风险管理
  max_position: 1.0                  # 最大仓位 (100%)
  stop_loss: -0.05                   # 止损 (-5%)
  take_profit: 0.10                  # 止盈 (10%)

# ============ 路径配置 ============
paths:
  data_dir: "data"
  model_dir: "models"
  results_dir: "results"
  logs_dir: "logs"

# ============ 日志配置 ============
logging:
  level: "INFO"                      # DEBUG/INFO/WARNING/ERROR
  log_to_file: true
  log_to_console: true
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
